version: '3.8'

services:
  script-manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOWNLOADS_PATH: ${DOWNLOADS_PATH:-/vol1/1000/downloads}
    container_name: script-manager
    ports:
      - "5000:5000"
    volumes:
      - ./scripts:/app/scripts
      - ./logs:/app/logs
      - ${DOWNLOADS_PATH:-/vol1/1000/downloads}:/app/downloads
      - ./jobs.json:/app/jobs.json
      - ./email_settings.json:/app/email_settings.json
      - ./script_metadata.json:/app/script_metadata.json
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
