name: Build Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: |
        docker build -t script-manager:latest .
        docker save -o script-manager.tar script-manager:latest
        gzip script-manager.tar
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: script-manager-image
        path: script-manager.tar.gz
        retention-days: 30
