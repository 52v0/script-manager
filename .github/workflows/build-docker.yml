name: Build Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: script-manager:latest
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/script-manager.tar

      - name: Compress image
        run: |
          gzip /tmp/script-manager.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: script-manager-image
          path: /tmp/script-manager.tar.gz
          retention-days: 7
